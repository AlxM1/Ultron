services:
  postgres:
    image: postgres:16-alpine
    container_name: raiser-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      AUTHENTIK_DB_PASSWORD: ${AUTHENTIK_DB_PASSWORD}
      AGENTSMITH_DB_PASSWORD: ${AGENTSMITH_DB_PASSWORD}
      KRYA_DB_PASSWORD: ${KRYA_DB_PASSWORD}
      VOICEFORGE_DB_PASSWORD: ${VOICEFORGE_DB_PASSWORD}
      YOUTUBEDL_DB_PASSWORD: ${YOUTUBEDL_DB_PASSWORD}
      NVP_DB_PASSWORD: ${NVP_DB_PASSWORD}
      SCRAPER_DB_PASSWORD: ${SCRAPER_DB_PASSWORD}
      AFFINE_DB_PASSWORD: ${AFFINE_DB_PASSWORD}
      CORTEX_DB_PASSWORD: ${CORTEX_DB_PASSWORD}
      CONTENT_INTEL_DB_PASSWORD: ${CONTENT_INTEL_DB_PASSWORD}
    ports:
    - 127.0.0.1:5432:5432
    volumes:
    - postgres_data:/var/lib/postgresql/data
    - ./scripts/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U ${POSTGRES_USER:-postgres}
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
    - raiser-net
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    cap_add:
    - CHOWN
    - DAC_OVERRIDE
    - FOWNER
    - SETGID
    - SETUID
    deploy:
      resources:
        limits:
          memory: 2g
  redis:
    image: redis:7-alpine
    container_name: raiser-redis
    restart: unless-stopped
    command: 'redis-server --appendonly yes --maxmemory 1gb --maxmemory-policy noeviction --requirepass ${REDIS_PASSWORD}

      '
    ports:
    - 127.0.0.1:6379:6379
    volumes:
    - redis_data:/data
    healthcheck:
      test:
      - CMD
      - redis-cli
      - -a
      - ${REDIS_PASSWORD}
      - ping
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
    - raiser-net
    security_opt: []
    cap_drop:
    - ALL
    cap_add:
    - SETGID
    - SETUID
    - CHOWN
    - DAC_OVERRIDE
    - FOWNER
    deploy:
      resources:
        limits:
          memory: 1536m
  authentik-server:
    image: ghcr.io/goauthentik/server:2025.2
    container_name: raiser-authentik-server
    restart: unless-stopped
    command: server
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?Set AUTHENTIK_SECRET_KEY in .env}
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_REDIS__PASSWORD: ${REDIS_PASSWORD}
      AUTHENTIK_POSTGRESQL__HOST: postgres
      AUTHENTIK_POSTGRESQL__PORT: 5432
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_DB_PASSWORD}
      AUTHENTIK_BOOTSTRAP_PASSWORD: ${AUTHENTIK_BOOTSTRAP_PASSWORD:-}
      AUTHENTIK_BOOTSTRAP_EMAIL: ${AUTHENTIK_BOOTSTRAP_EMAIL:-}
      AUTHENTIK_HOST: "https://auth.00raiser.space"
    ports:
    - 0.0.0.0:9000:9000
    - 0.0.0.0:9443:9443
    volumes:
    - authentik_media:/media
    - authentik_templates:/templates
    - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
    - raiser-net
    security_opt: []
    cap_drop:
    - ALL
    deploy:
      resources:
        limits:
          memory: 1g
  authentik-worker:
    image: ghcr.io/goauthentik/server:2025.2
    container_name: raiser-authentik-worker
    restart: unless-stopped
    command: worker
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_REDIS__HOST: redis
      AUTHENTIK_REDIS__PASSWORD: ${REDIS_PASSWORD}
      AUTHENTIK_POSTGRESQL__HOST: postgres
      AUTHENTIK_POSTGRESQL__PORT: 5432
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_DB_PASSWORD}
    volumes:
    - authentik_media:/media
    - authentik_templates:/templates
    - authentik_certs:/certs
    - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
    - raiser-net
    security_opt: []
    cap_drop:
    - ALL
    deploy:
      resources:
        limits:
          memory: 1g
  agentsmith-backend:
    build:
      context: ./services/agentsmith
      dockerfile: docker/Dockerfile.backend
    container_name: raiser-agentsmith-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: raiser
      DB_USERNAME: agentsmith
      DB_PASSWORD: ${AGENTSMITH_DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${AGENTSMITH_JWT_SECRET}
      JWT_REFRESH_SECRET: ${AGENTSMITH_JWT_REFRESH_SECRET}
      ENCRYPTION_KEY: ${AGENTSMITH_ENCRYPTION_KEY}
      SESSION_SECRET: ${AGENTSMITH_SESSION_SECRET}
      APP_URL: ${AGENTSMITH_APP_URL:-http://localhost:3000}
      API_URL: ${AGENTSMITH_API_URL:-http://localhost:4000}
      WEBHOOK_URL: ${AGENTSMITH_API_URL:-http://localhost:4000}/webhooks
      WEBHOOK_API_KEY: ${WEBHOOK_API_KEY:-}
      CORS_ORIGIN: ${AGENTSMITH_CORS_ORIGIN:-http://localhost:3000,http://localhost:3001,http://localhost:3020}
      SSO_ENABLED: "true"
      GOOGLE_CLIENT_ID: ${AGENTSMITH_GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${AGENTSMITH_GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${AGENTSMITH_GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${AGENTSMITH_GITHUB_CLIENT_SECRET:-}
      # Authentik OIDC SSO
      SSO_OIDC_ENABLED: "true"
      SSO_OIDC_NAME: "Authentik"
      SSO_OIDC_CLIENT_ID: "38d07f506a5f5e4e9895e382241dcb58e1f44018"
      SSO_OIDC_CLIENT_SECRET: ${AGENTSMITH_OIDC_CLIENT_SECRET}
      SSO_OIDC_ISSUER: "https://auth.00raiser.space/"
      SSO_OIDC_AUTH_URL: "https://auth.00raiser.space/application/o/authorize/"
      SSO_OIDC_TOKEN_URL: "http://raiser-authentik-server:9000/application/o/token/"
      SSO_OIDC_USERINFO_URL: "http://raiser-authentik-server:9000/application/o/userinfo/"
      SSO_OIDC_JWKS_URI: "http://raiser-authentik-server:9000/application/o/agentsmith/jwks/"
      SSO_OIDC_CALLBACK_URL: "https://smith.00raiser.space/api/v1/auth/sso/oidc/callback"
      SSO_OIDC_SCOPES: "openid,email,profile"
      SMTP_ENABLED: ${AGENTSMITH_SMTP_ENABLED:-false}
      SMTP_HOST: ${AGENTSMITH_SMTP_HOST:-}
      SMTP_PORT: ${AGENTSMITH_SMTP_PORT:-587}
      SMTP_USER: ${AGENTSMITH_SMTP_USER:-}
      SMTP_PASS: ${AGENTSMITH_SMTP_PASSWORD:-}
      SMTP_FROM: ${AGENTSMITH_SMTP_FROM:-noreply@agentsmith.local}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY:-}
      LOG_LEVEL: ${AGENTSMITH_LOG_LEVEL:-info}
      TASK_BRIDGE_URL: http://raiser-cortex:3011
    ports:
    - 0.0.0.0:4000:4000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
    - raiser-net
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    deploy:
      resources:
        limits:
          memory: 1g
  agentsmith-worker:
    build:
      context: ./services/agentsmith
      dockerfile: docker/Dockerfile.worker
    container_name: raiser-agentsmith-worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: raiser
      DB_USERNAME: agentsmith
      DB_PASSWORD: ${AGENTSMITH_DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      ENCRYPTION_KEY: ${AGENTSMITH_ENCRYPTION_KEY}
      WORKER_CONCURRENCY: ${AGENTSMITH_WORKER_CONCURRENCY:-5}
      EXECUTION_TIMEOUT: 3600000
      LOG_LEVEL: ${AGENTSMITH_LOG_LEVEL:-info}
      TASK_BRIDGE_URL: http://raiser-cortex:3011
      TASK_BRIDGE_API_KEY: ${CORTEX_API_KEY}
      CONTENT_INTEL_URL: http://raiser-content-intel:3015
      CONTENT_INTEL_API_KEY: ${CONTENT_INTEL_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      agentsmith-backend:
        condition: service_healthy
    networks:
    - raiser-net
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    deploy:
      resources:
        limits:
          memory: 1g
  agentsmith-frontend:
    build:
      context: ./services/agentsmith
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_API_URL: ${AGENTSMITH_API_URL:-http://localhost:4000}
        VITE_WS_URL: ws://localhost:4000/ws
    container_name: raiser-agentsmith-frontend
    restart: unless-stopped
    ports:
    - 0.0.0.0:3000:3000
    depends_on:
      agentsmith-backend:
        condition: service_healthy
    networks:
    - raiser-net
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    deploy:
      resources:
        limits:
          memory: 256m
    cap_add:
    - CHOWN
    - DAC_OVERRIDE
    - SETGID
    - SETUID
    - NET_BIND_SERVICE
  agentsmith-admin:
    build:
      context: ./services/agentsmith
      dockerfile: docker/Dockerfile.admin
      args:
        VITE_API_URL: ${AGENTSMITH_API_URL:-http://localhost:4000}
    container_name: raiser-agentsmith-admin
    restart: unless-stopped
    ports:
    - 0.0.0.0:3001:3001
    depends_on:
      agentsmith-backend:
        condition: service_healthy
    networks:
    - raiser-net
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    deploy:
      resources:
        limits:
          memory: 256m
    cap_add:
    - CHOWN
    - DAC_OVERRIDE
    - SETGID
    - SETUID
    - NET_BIND_SERVICE
  krya:
    build:
      context: ./services/krya
      dockerfile: apps/web/Dockerfile
    container_name: raiser-krya
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: '5432'
      DB_USER: krya
      DB_PASSWORD: ${KRYA_DB_PASSWORD}
      DB_NAME: krya
      DATABASE_URL: postgresql://krya:${KRYA_DB_PASSWORD}@postgres:5432/krya
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: '1'
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://krya.00raiser.space}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://krya.00raiser.space}
      FAL_KEY: ${FAL_KEY:-}
      REPLICATE_API_TOKEN: ${REPLICATE_API_TOKEN:-}
      TOGETHER_API_KEY: ${TOGETHER_API_KEY:-}
      OPENAI_API_KEY: ${KRYA_OPENAI_API_KEY:-}
      GOOGLE_AI_API_KEY: ${KRYA_GOOGLE_AI_API_KEY:-}
      GOOGLE_IMAGE_MODEL: ${GOOGLE_IMAGE_MODEL:-imagen-4.0-generate-preview-05-20}
      GOOGLE_VIDEO_MODEL: ${GOOGLE_VIDEO_MODEL:-veo-3.0-generate-preview}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      HF_TOKEN: ${HF_TOKEN:-}
      GPU_SERVER_HOST: ${GPU_SERVER_HOST:-}
      GPU_SERVER_PORT: ${GPU_SERVER_PORT:-8189}
      COMFYUI_HOST: ${COMFYUI_HOST:-}
      COMFYUI_PORT: ${COMFYUI_PORT:-8189}
      COMFYUI_URL: ${COMFYUI_URL:-}
      COMFYUI_OUTPUT_URL: ${COMFYUI_OUTPUT_URL:-}
      OLLAMA_HOST: ${OLLAMA_HOST:-}
      OLLAMA_URL: ${OLLAMA_URL:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:latest}
      UPLOAD_DIR: /app/uploads
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
      TASK_BRIDGE_URL: http://raiser-cortex:3011
      # Authentik OIDC SSO (Krya uses forward-auth headers; OIDC vars stored for reference/future)
      OIDC_CLIENT_ID: "9e888a8e609c7e3d026f0f65e4b8c1231597da28"
      OIDC_CLIENT_SECRET: ${KRYA_OIDC_CLIENT_SECRET}
      OIDC_ISSUER_URL: "https://auth.00raiser.space/application/o/krya/"
    ports:
    - 0.0.0.0:3100:3000
    volumes:
    - /mnt/data/00raiser/media/krya:/app/uploads
    healthcheck:
      test:
      - CMD-SHELL
      - node -e "require('http').get('http://127.0.0.1:3000/',r=>{process.exit(r.statusCode<500?0:1)}).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
    - raiser-net
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    deploy:
      resources:
        limits:
          memory: 1g
  apify:
    build:
      context: ./services/apify
      dockerfile: Dockerfile
    container_name: raiser-apify
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: '8000'
      DATABASE_URL: postgresql+asyncpg://scraper:${SCRAPER_DB_PASSWORD}@postgres:5432/scraper
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: '2'
      UPLOAD_DIR: /app/uploads
      MEDIA_PATH: /app/uploads
      WEBSHARE_API_KEY: ${WEBSHARE_API_KEY:-}
      SCRAPERAPI_KEY: ${SCRAPERAPI_KEY:-}
      SCRAPINGBEE_KEY: ${SCRAPINGBEE_KEY:-}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      REDDIT_CLIENT_ID: ${REDDIT_CLIENT_ID:-}
      REDDIT_CLIENT_SECRET: ${REDDIT_CLIENT_SECRET:-}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      INSTAGRAM_USERNAME: ${INSTAGRAM_USERNAME:-}
      INSTAGRAM_PASSWORD: ${INSTAGRAM_PASSWORD:-}
      INSTAGRAM_PROXY: ${INSTAGRAM_PROXY:-}
      TASK_BRIDGE_URL: http://raiser-cortex:3011
    ports:
    - 0.0.0.0:8400:8000
    volumes:
    - /mnt/data/00raiser/media/apify:/app/uploads
    - /mnt/data/00raiser/media/scraper:/mnt/data/00raiser/media/scraper
    healthcheck:
      test:
      - CMD-SHELL
      - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/auth/status', timeout=5)" ||
        exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
    - raiser-net
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    deploy:
      resources:
        limits:
          memory: 1g
  voiceforge:
    build:
      context: ./services/voiceforge/voiceforge
      dockerfile: docker/Dockerfile.backend
    container_name: raiser-voiceforge
    restart: unless-stopped
    environment:
      APP_NAME: voiceforge
      DEBUG: 'false'
      SECRET_KEY: ${VOICEFORGE_SECRET_KEY}
      HOST: 0.0.0.0
      PORT: 8000
      DATABASE_URL: postgresql+asyncpg://voiceforge:${VOICEFORGE_DB_PASSWORD}@postgres:5432/voiceforge
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: 3
      STORAGE_TYPE: local
      STORAGE_PATH: /app/storage
      DEVICE: ${VOICEFORGE_DEVICE:-cpu}
      GPU_SERVER_HOST: ${GPU_SERVER_HOST:-}
      GPU_SERVER_PORT: ${GPU_SERVER_PORT:-8189}
      OLLAMA_HOST: ${OLLAMA_HOST:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:latest}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      HF_TOKEN: ${HF_TOKEN:-}
      CORS_ORIGINS: '["http://localhost:8100"]'
      NUMBA_CACHE_DIR: /tmp/numba_cache
      MPLCONFIGDIR: /tmp/matplotlib
      TASK_BRIDGE_URL: http://raiser-cortex:3011
    ports:
    - 0.0.0.0:8100:8000
    volumes:
    - voiceforge_storage:/app/storage
    - voiceforge_models:/home/voiceforge/.cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
    - raiser-net
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    deploy:
      resources:
        limits:
          memory: 2g
  youtubedl:
    build:
      context: ./services/youtubedl
      dockerfile: Dockerfile
    container_name: raiser-youtubedl
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      DOWNLOAD_DIR: /app/downloads
      DATABASE_URL: postgresql+asyncpg://youtubedl:${YOUTUBEDL_DB_PASSWORD}@postgres:5432/raiser
      MAX_CONCURRENT_DOWNLOADS: ${YOUTUBEDL_MAX_CONCURRENT:-3}
      EXTRACT_RATE_LIMIT: ${YOUTUBEDL_EXTRACT_RATE_LIMIT:-10}
      MIN_FREE_DISK_MB: ${YOUTUBEDL_MIN_FREE_DISK_MB:-500}
      API_KEY: ${YOUTUBEDL_API_KEY:-}
      TASK_BRIDGE_URL: http://raiser-cortex:3011
      CORTEX_URL: http://raiser-cortex:3011
      CORTEX_API_KEY: ${CORTEX_API_KEY}
    ports:
    - 0.0.0.0:8200:8000
    volumes:
    - youtubedl_downloads:/app/downloads
    - youtubedl_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
    - raiser-net
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    deploy:
      resources:
        limits:
          memory: 1g
  whisperflow:
    build:
      context: ./services/whisperflow
      dockerfile: Dockerfile
    container_name: raiser-whisperflow
    restart: unless-stopped
    environment:
      WHISPERFLOW_API_KEY: ${WHISPERFLOW_API_KEY:-}
      WHISPERFLOW_DATA_DIR: /data
      WHISPERFLOW_PROXY_HEADERS: '1'
      WHISPERFLOW_ALLOWED_ORIGINS: ${WHISPERFLOW_ALLOWED_ORIGINS:-}
      WHISPERFLOW_REMOTE_HOST: ${WINDOWS_PC_IP:-192.168.1.100}
      WHISPERFLOW_REMOTE_PORT: '8765'
      GPU_SERVER_HOST: ${GPU_SERVER_HOST:-}
      OLLAMA_HOST: ${OLLAMA_HOST:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:latest}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      HF_TOKEN: ${HF_TOKEN:-}
      TASK_BRIDGE_URL: http://raiser-cortex:3011
    ports:
    - 0.0.0.0:8766:8766
    volumes:
    - whisperflow_data:/data
    - ./services/whisperflow/config:/usr/local/lib/python3.11/site-packages/config:ro
    healthcheck:
      test:
      - CMD-SHELL
      - python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:8766/api/health', timeout=5)" || exit
        1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
    - raiser-net
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    deploy:
      resources:
        limits:
          memory: 2g
  newsletter-pipeline:
    build:
      context: ./services/newsletter/newsletter-video-pipeline
      dockerfile: services/api-gateway/Dockerfile
    container_name: raiser-newsletter-pipeline
    restart: unless-stopped
    environment:
      ENVIRONMENT: production
      API_HOST: 0.0.0.0
      API_PORT: 8000
      API_KEY: ${NVP_API_KEY}
      SECRET_KEY: ${NVP_SECRET_KEY}
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+asyncpg://nvp:${NVP_DB_PASSWORD}@postgres:5432/newsletter_pipeline
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/3
      GPU_HOST: ${WINDOWS_PC_IP:-192.168.1.100}
      VOICE_CLONER_URL: http://${WINDOWS_PC_IP:-192.168.1.100}:${NVP_GPU_VOICE_PORT:-5002}
      AVATAR_GENERATOR_URL: http://${WINDOWS_PC_IP:-192.168.1.100}:${NVP_GPU_AVATAR_PORT:-5003}
      LLM_PROVIDER: ${NVP_LLM_PROVIDER:-local}
      LLM_MODEL: ${NVP_LLM_MODEL:-qwen2.5:7b}
      GPU_SERVER_HOST: ${GPU_SERVER_HOST:-}
      GPU_SERVER_PORT: ${GPU_SERVER_PORT:-8189}
      COMFYUI_HOST: ${COMFYUI_HOST:-}
      COMFYUI_PORT: ${COMFYUI_PORT:-8189}
      OLLAMA_HOST: ${OLLAMA_HOST:-}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2:latest}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      HF_TOKEN: ${HF_TOKEN:-}
      TASK_BRIDGE_URL: http://raiser-cortex:3011
    ports:
    - 0.0.0.0:8300:8000
    volumes:
    - nvp_data:/app/data
    - nvp_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
    - raiser-net
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    deploy:
      resources:
