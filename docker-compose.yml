      test:
      - CMD-SHELL
      - python3 -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/', timeout=5)" || exit 1
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
    - raiser-net
    deploy:
      resources:
        limits:
          memory: 512m

  teable:
    image: ghcr.io/teableio/teable:latest
    container_name: raiser-teable
    restart: unless-stopped
    ports:
    - 0.0.0.0:3004:3000
    environment:
      PRISMA_DATABASE_URL: postgresql://teable:${TEABLE_DB_PASSWORD}@postgres:5432/teable
      PUBLIC_ORIGIN: https://teable.00raiser.space
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
    - teable_data:/app/.assets
    healthcheck:
      test:
      - CMD-SHELL
      - wget -qO- http://127.0.0.1:3000/health || exit 1
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
    - raiser-net
    deploy:
      resources:
        limits:
          memory: 1g

  crawlee-scraper:
    build:
      context: ./services/crawlee
      dockerfile: Dockerfile
    container_name: raiser-crawlee
    restart: unless-stopped
    ports:
    - 0.0.0.0:3500:3500
    environment:
      NODE_ENV: production
      MAX_CONCURRENT: "2"
      REQUEST_DELAY_MIN: "3000"
      REQUEST_DELAY_MAX: "10000"
      HEADLESS: "true"
      API_KEY: ${CRAWLEE_API_KEY}
    volumes:
    - crawlee_data:/app/data
    - crawlee_storage:/app/storage
    healthcheck:
      test:
      - CMD-SHELL
      - node -e "require('http').get('http://127.0.0.1:3500/health',r=>{process.exit(r.statusCode<500?0:1)}).on('error',()=>process.exit(1))"
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
    - raiser-net
    deploy:
      resources:
        limits:
          memory: 2g

  # =========================================================================
  # FIRECRAWL — Web Data API for AI (self-hosted)
  # =========================================================================

  firecrawl-playwright:
    build: ./services/firecrawl/apps/playwright-service-ts
    container_name: raiser-firecrawl-playwright
    restart: unless-stopped
    environment:
      PORT: "3000"
      MAX_CONCURRENT_PAGES: "5"
    networks:
    - raiser-net
    deploy:
      resources:
        limits:
          memory: 4g

  firecrawl-rabbitmq:
    image: rabbitmq:3-management
    container_name: raiser-firecrawl-rabbitmq
    restart: unless-stopped
    networks:
    - raiser-net
    healthcheck:
      test:
      - CMD
      - rabbitmq-diagnostics
      - -q
      - check_running
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512m

  firecrawl:
    image: ghcr.io/firecrawl/firecrawl:latest
    container_name: raiser-firecrawl
    restart: unless-stopped
    command: node dist/src/harness.js --start-docker
    environment:
      HOST: "0.0.0.0"
      PORT: "3002"
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/6
      REDIS_RATE_LIMIT_URL: redis://:${REDIS_PASSWORD}@redis:6379/6
      PLAYWRIGHT_MICROSERVICE_URL: http://raiser-firecrawl-playwright:3000/scrape
      USE_DB_AUTHENTICATION: "false"
      BULL_AUTH_KEY: ${FIRECRAWL_BULL_AUTH_KEY:-changeme}
      NUM_WORKERS_PER_QUEUE: "4"
      CRAWL_CONCURRENT_REQUESTS: "5"
      MAX_CONCURRENT_JOBS: "3"
      NUQ_RABBITMQ_URL: amqp://raiser-firecrawl-rabbitmq:5672
      SEARXNG_ENDPOINT: http://raiser-searxng:8080
      OLLAMA_BASE_URL: http://10.25.10.60:11434/api
      MODEL_NAME: llama3.2
      NUQ_DATABASE_URL: postgresql://firecrawl:${FIRECRAWL_DB_PASSWORD}@postgres:5432/firecrawl
      POSTGRES_USER: firecrawl
      POSTGRES_PASSWORD: ${FIRECRAWL_DB_PASSWORD}
      POSTGRES_DB: firecrawl
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    ports:
    - 0.0.0.0:3018:3002
    depends_on:
      redis:
        condition: service_healthy
      firecrawl-playwright:
        condition: service_started
      firecrawl-rabbitmq:
        condition: service_healthy
    networks:
    - raiser-net
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    deploy:
      resources:
        limits:
          memory: 4g

  comment-intel:
    build:
      context: ./services/comment-intel
      dockerfile: Dockerfile
    container_name: raiser-comment-intel
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: content_intel
      PORT: "3019"
    ports:
    - 0.0.0.0:3019:3019
    depends_on:
      postgres:
        condition: service_healthy
    networks:
    - raiser-net
    security_opt:
    - no-new-privileges:true
    cap_drop:
    - ALL
    deploy:
      resources:
        limits:
          memory: 512m

volumes:
  postgres_data: null
  redis_data: null
  authentik_media: null
  authentik_templates: null
  authentik_certs: null
  voiceforge_storage: null
  voiceforge_models: null
  youtubedl_downloads: null
  youtubedl_data: null
  whisperflow_data: null
  nvp_data: null
  nvp_logs: null
  persona_data: null
  outline_data: null
  minio_data: null
  uptime_kuma_data: null
  stirling_data: null
  postiz_uploads: null
  gitea_data: null
  listmonk_uploads: null
  changedetection_data: null
  teable_data: null
  crawlee_data: null
  crawlee_storage: null
networks:
  raiser-net:
    driver: bridge
